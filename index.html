<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kalori">
<title>Kalori Takibi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f14;
  --bg2: #17171e;
  --bg3: #1e1e28;
  --bg4: #26263200;
  --card: #1a1a22;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f5;
  --text2: rgba(240,240,245,0.55);
  --text3: rgba(240,240,245,0.3);
  --purple: #a78bfa;
  --purple2: #7c5cfc;
  --purple-bg: rgba(167,139,250,0.12);
  --blue: #60a5fa;
  --blue-bg: rgba(96,165,250,0.12);
  --green: #34d399;
  --green-bg: rgba(52,211,153,0.12);
  --amber: #fbbf24;
  --amber-bg: rgba(251,191,36,0.12);
  --pink: #f472b6;
  --pink-bg: rgba(244,114,182,0.12);
  --red: #f87171;
  --radius: 16px;
  --radius-sm: 10px;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* LAYOUT */
.app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; position: relative; }
.content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0 16px 120px; scroll-behavior: smooth; }
.content::-webkit-scrollbar { display: none; }

/* TOP BAR */
.topbar {
  padding: 52px 20px 16px;
  background: linear-gradient(180deg, var(--bg) 0%, transparent 100%);
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.topbar-date { display: flex; align-items: center; gap: 10px; }
.date-nav-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--bg3); border: 0.5px solid var(--border);
  color: var(--text2); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.date-nav-btn:active { transform: scale(0.9); background: var(--bg4); }
.date-label { font-size: 17px; font-weight: 600; color: var(--text); min-width: 80px; text-align: center; }
.date-sub { font-size: 12px; color: var(--text3); font-family: var(--mono); }
.topbar-right { font-size: 22px; cursor: pointer; }

/* HERO RING */
.hero { padding: 8px 0 24px; display: flex; flex-direction: column; align-items: center; }
.ring-wrap { position: relative; width: 180px; height: 180px; }
.ring-svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--bg3); stroke-width: 14; }
.ring-fill { fill: none; stroke-width: 14; stroke-linecap: round; transition: stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1); }
.ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ring-cal { font-size: 32px; font-weight: 600; color: var(--text); font-family: var(--mono); }
.ring-label { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
.ring-remain { font-size: 13px; color: var(--text2); margin-top: 2px; }

/* MACRO PILLS */
.macro-row { display: flex; gap: 8px; width: 100%; margin-bottom: 20px; }
.macro-pill {
  flex: 1; background: var(--card); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 8px; text-align: center;
}
.macro-pill .mp-val { font-size: 16px; font-weight: 600; font-family: var(--mono); }
.macro-pill .mp-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
.macro-pill .mp-bar { height: 3px; border-radius: 2px; margin-top: 6px; background: var(--bg3); overflow: hidden; }
.macro-pill .mp-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

/* WATER */
.section { margin-bottom: 20px; }
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.section-title { font-size: 13px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; }
.section-meta { font-size: 13px; color: var(--text3); font-family: var(--mono); }

.water-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; }
.water-cups { display: flex; gap: 6px; flex-wrap: wrap; }
.cup {
  width: 38px; height: 44px; border-radius: 10px;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer; transition: all 0.15s;
  background: var(--bg3);
  position: relative; overflow: hidden;
}
.cup.filled { border-color: var(--blue); background: var(--blue-bg); }
.cup:active { transform: scale(0.88); }
.water-progress { height: 4px; background: var(--bg3); border-radius: 2px; margin-top: 12px; overflow: hidden; }
.water-progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.5s ease; }
.water-text { font-size: 12px; color: var(--text3); margin-top: 8px; font-family: var(--mono); }

/* MEALS */
.meal-item {
  background: var(--card); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 14px;
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 8px; transition: all 0.2s;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.meal-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; background: var(--bg3); flex-shrink: 0;
}
.meal-info { flex: 1; min-width: 0; }
.meal-name { font-size: 15px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.meal-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
.meal-badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 20px; margin-left: 5px; font-family: var(--mono); }
.badge-breakfast { background: var(--amber-bg); color: var(--amber); }
.badge-lunch { background: var(--green-bg); color: var(--green); }
.badge-dinner { background: var(--purple-bg); color: var(--purple); }
.badge-snack { background: var(--pink-bg); color: var(--pink); }
.meal-cal { font-size: 15px; font-weight: 600; color: var(--purple); font-family: var(--mono); flex-shrink: 0; }
.meal-del { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px; flex-shrink: 0; transition: color 0.2s; }
.meal-del:active { color: var(--red); }

.empty { text-align: center; padding: 32px 16px; color: var(--text3); }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.empty p { font-size: 14px; line-height: 1.6; }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: rgba(15,15,20,0.92);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-top: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-around;
  padding: 10px 0 28px; z-index: 100;
}
.nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; padding: 4px 16px; }
.nav-icon { font-size: 22px; transition: transform 0.2s; }
.nav-label { font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
.nav-btn.active .nav-icon { transform: scale(1.15); }
.nav-btn.active .nav-label { color: var(--purple); }

.add-fab {
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--purple2), var(--purple));
  border: none; color: white; font-size: 26px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 24px rgba(124,92,252,0.45);
  transition: all 0.2s; margin-top: -20px;
}
.add-fab:active { transform: scale(0.9); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: 28px 28px 0 0; padding: 8px 20px 40px;
  width: 100%; max-width: 480px;
  transform: translateY(40px); transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  max-height: 92dvh; overflow-y: auto;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 12px auto 20px; }
.modal-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; text-align: center; }

.tabs { display: flex; gap: 8px; margin-bottom: 20px; background: var(--bg3); border-radius: var(--radius-sm); padding: 4px; }
.tab { flex: 1; padding: 9px; border-radius: 8px; border: none; background: none; color: var(--text2); font-size: 14px; cursor: pointer; font-family: var(--font); transition: all 0.2s; }
.tab.active { background: var(--card); color: var(--text); font-weight: 500; }

/* Photo panel */
.photo-drop {
  border: 1.5px dashed var(--border2); border-radius: var(--radius);
  padding: 32px 20px; text-align: center; cursor: pointer;
  position: relative; transition: background 0.2s;
}
.photo-drop:active { background: var(--bg3); }
.photo-drop input { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
.photo-drop-icon { font-size: 36px; margin-bottom: 10px; }
.photo-drop-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.photo-drop-sub { font-size: 13px; color: var(--text3); }

.preview-img { width: 100%; max-height: 200px; object-fit: cover; border-radius: var(--radius); margin-bottom: 14px; }

.ai-card { background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
.ai-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.ai-badge { font-size: 11px; background: var(--purple-bg); color: var(--purple); padding: 3px 8px; border-radius: 20px; font-family: var(--mono); }
.ai-food-name { font-size: 16px; font-weight: 600; }
.ai-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 0.5px solid var(--border); font-size: 14px; }
.ai-row:last-child { border-bottom: none; }
.ai-row span:first-child { color: var(--text2); }
.ai-row span:last-child { font-family: var(--mono); font-weight: 500; }

.meal-type-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.meal-type-chip {
  padding: 7px 14px; border-radius: 20px; border: 1.5px solid var(--border);
  background: none; color: var(--text2); font-size: 13px; cursor: pointer; font-family: var(--font); transition: all 0.15s;
}
.meal-type-chip.sel-breakfast { border-color: var(--amber); background: var(--amber-bg); color: var(--amber); }
.meal-type-chip.sel-lunch { border-color: var(--green); background: var(--green-bg); color: var(--green); }
.meal-type-chip.sel-dinner { border-color: var(--purple); background: var(--purple-bg); color: var(--purple); }
.meal-type-chip.sel-snack { border-color: var(--pink); background: var(--pink-bg); color: var(--pink); }

.btn-primary {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg, var(--purple2), var(--purple));
  border: none; border-radius: var(--radius); color: white;
  font-size: 15px; font-weight: 600; cursor: pointer; font-family: var(--font);
  transition: all 0.2s; box-shadow: 0 4px 20px rgba(124,92,252,0.3);
}
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-green {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg, #059669, var(--green));
  border: none; border-radius: var(--radius); color: white;
  font-size: 15px; font-weight: 600; cursor: pointer; font-family: var(--font);
  transition: all 0.2s; margin-top: 8px;
}

/* Manual form */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; display: block; }
.form-input {
  width: 100%; padding: 13px 14px;
  background: var(--bg3); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 15px; font-family: var(--font); outline: none; transition: border 0.2s;
}
.form-input:focus { border-color: var(--purple); }
.form-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* Loading */
.loading-box { text-align: center; padding: 24px; }
.spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid var(--bg3); border-top-color: var(--purple);
  animation: spin 0.7s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-box p { font-size: 14px; color: var(--text3); }

/* Success toast */
.toast {
  position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--green); color: #022c22; padding: 12px 24px;
  border-radius: 40px; font-size: 14px; font-weight: 600;
  z-index: 300; opacity: 0; transition: all 0.3s; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(52,211,153,0.3);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="topbar-date">
      <button class="date-nav-btn" id="prev-btn">‹</button>
      <div>
        <div class="date-label" id="date-label">Bugün</div>
        <div class="date-sub" id="date-sub"></div>
      </div>
      <button class="date-nav-btn" id="next-btn">›</button>
    </div>
    <div style="font-size:13px;color:var(--text3);font-family:var(--mono);" id="kcal-remain"></div>
  </div>

  <div class="content" id="main-content">
    <!-- Hero ring -->
    <div class="hero">
      <div class="ring-wrap">
        <svg class="ring-svg" width="180" height="180" viewBox="0 0 180 180">
          <circle class="ring-bg" cx="90" cy="90" r="75"/>
          <circle class="ring-fill" id="ring-fill" cx="90" cy="90" r="75"
            stroke="url(#ringGrad)"
            stroke-dasharray="471"
            stroke-dashoffset="471"/>
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#7c5cfc"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="ring-center">
          <div class="ring-cal" id="ring-cal">0</div>
          <div class="ring-label">kcal</div>
          <div class="ring-remain" id="ring-remain">/ 2000</div>
        </div>
      </div>
    </div>

    <!-- Macros -->
    <div class="macro-row">
      <div class="macro-pill">
        <div class="mp-val" id="m-protein" style="color:var(--green)">0g</div>
        <div class="mp-label">Protein</div>
        <div class="mp-bar"><div class="mp-bar-fill" id="mb-protein" style="background:var(--green);width:0%"></div></div>
      </div>
      <div class="macro-pill">
        <div class="mp-val" id="m-carbs" style="color:var(--amber)">0g</div>
        <div class="mp-label">Karb</div>
        <div class="mp-bar"><div class="mp-bar-fill" id="mb-carbs" style="background:var(--amber);width:0%"></div></div>
      </div>
      <div class="macro-pill">
        <div class="mp-val" id="m-fat" style="color:var(--pink)">0g</div>
        <div class="mp-label">Yağ</div>
        <div class="mp-bar"><div class="mp-bar-fill" id="mb-fat" style="background:var(--pink);width:0%"></div></div>
      </div>
    </div>

    <!-- Water -->
    <div class="section">
      <div class="section-head">
        <span class="section-title">Su Takibi</span>
        <span class="section-meta" id="water-text">0 / 2500 ml</span>
      </div>
      <div class="water-card">
        <div class="water-cups" id="water-cups"></div>
        <div class="water-progress"><div class="water-progress-fill" id="water-bar" style="width:0%"></div></div>
        <div class="water-text">Her bardak 250 ml · Tıkla ekle/çıkar</div>
      </div>
    </div>

    <!-- Meals -->
    <div class="section">
      <div class="section-head">
        <span class="section-title">Öğünler</span>
        <span class="section-meta" id="meal-count">0 öğün</span>
      </div>
      <div id="meal-list"></div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-home">
      <span class="nav-icon">◎</span>
      <span class="nav-label">Bugün</span>
    </button>
    <button class="add-fab" id="fab-btn">＋</button>
    <button class="nav-btn" id="nav-stats" onclick="showStats()">
      <span class="nav-icon">◈</span>
      <span class="nav-label">İstatistik</span>
    </button>
  </nav>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Öğün Ekle</div>

    <div class="tabs">
      <button class="tab active" id="tab-photo" onclick="switchTab('photo')">📷 Fotoğraf</button>
      <button class="tab" id="tab-manual" onclick="switchTab('manual')">✏️ Manuel</button>
    </div>

    <!-- Photo -->
    <div id="panel-photo">
      <div class="photo-drop" id="drop-zone">
        <input type="file" id="photo-input" accept="image/*" capture="environment" />
        <div class="photo-drop-icon">📷</div>
        <div class="photo-drop-title">Yemek fotoğrafı çek</div>
        <div class="photo-drop-sub">AI yemeği tanır ve kalorisini hesaplar</div>
      </div>
      <div id="photo-result"></div>
    </div>

    <!-- Manual -->
    <div id="panel-manual" style="display:none">
      <div class="form-group">
        <label class="form-label">Yemek Adı</label>
        <input class="form-input" id="food-name" type="text" placeholder="Örn: mercimek çorbası" autocomplete="off" />
      </div>
      <div class="form-row2">
        <div class="form-group">
          <label class="form-label">Miktar</label>
          <input class="form-input" id="food-gram" type="number" placeholder="300" min="1" inputmode="numeric" />
        </div>
        <div class="form-group">
          <label class="form-label">Birim</label>
          <select class="form-input" id="food-unit">
            <option value="g">gram</option>
            <option value="adet">adet</option>
            <option value="ml">ml</option>
            <option value="porsiyon">porsiyon</option>
            <option value="dilim">dilim</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Öğün</label>
        <div class="meal-type-row" id="manual-meal-chips">
          <button class="meal-type-chip sel-breakfast" data-type="Kahvaltı" onclick="selectMealType(this,'manual')">☀️ Kahvaltı</button>
          <button class="meal-type-chip" data-type="Öğle" onclick="selectMealType(this,'manual')">🌤 Öğle</button>
          <button class="meal-type-chip" data-type="Akşam" onclick="selectMealType(this,'manual')">🌙 Akşam</button>
          <button class="meal-type-chip" data-type="Atıştırma" onclick="selectMealType(this,'manual')">🍎 Atıştırma</button>
        </div>
      </div>
      <button class="btn-primary" id="manual-btn" onclick="addManual()">Kalori Hesapla ve Ekle</button>
      <div id="manual-result"></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const GOAL_CAL = 2000;
const WATER_GOAL = 2500;
const WATER_CUPS = 10;
const CIRCUM = 2 * Math.PI * 75;

let API_KEY = localStorage.getItem('anthropic_api_key') || '';
function getApiKey() {
  if (API_KEY) return API_KEY;
  const key = prompt('Anthropic API anahtarini gir (sk-ant- ile baslar):');
  if (key && key.trim().startsWith('sk-')) {
    API_KEY = key.trim();
    localStorage.setItem('anthropic_api_key', API_KEY);
    return API_KEY;
  }
  alert('Gecersiz anahtar!');
  return '';
}

let currentDate = new Date();
currentDate.setHours(0,0,0,0);
let allData = JSON.parse(localStorage.getItem('kalori_data') || '{}');
let selectedMealTypePhoto = 'Öğle';
let selectedMealTypeManual = 'Kahvaltı';

function save() { localStorage.setItem('kalori_data', JSON.stringify(allData)); }
function dateKey(d) { return d.toISOString().split('T')[0]; }
function getDay() {
  const k = dateKey(currentDate);
  if (!allData[k]) allData[k] = { meals: [], water: 0 };
  return allData[k];
}

// Date nav
document.getElementById('prev-btn').onclick = () => { currentDate.setDate(currentDate.getDate()-1); updateAll(); };
document.getElementById('next-btn').onclick = () => { currentDate.setDate(currentDate.getDate()+1); updateAll(); };

function updateDateDisplay() {
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((currentDate - today) / 86400000);
  const lbl = document.getElementById('date-label');
  const sub = document.getElementById('date-sub');
  if (diff === 0) lbl.textContent = 'Bugün';
  else if (diff === -1) lbl.textContent = 'Dün';
  else lbl.textContent = currentDate.toLocaleDateString('tr-TR', {day:'numeric',month:'long'});
  sub.textContent = currentDate.toLocaleDateString('tr-TR', {weekday:'long'});
}

function updateAll() {
  updateDateDisplay();
  renderSummary();
  renderWater();
  renderMeals();
}

function renderSummary() {
  const day = getDay();
  const totalCal = day.meals.reduce((s,m) => s + m.calories, 0);
  const protein = day.meals.reduce((s,m) => s + (m.protein||0), 0);
  const carbs = day.meals.reduce((s,m) => s + (m.carbs||0), 0);
  const fat = day.meals.reduce((s,m) => s + (m.fat||0), 0);
  const pct = Math.min(1, totalCal / GOAL_CAL);
  const offset = CIRCUM * (1 - pct);
  document.getElementById('ring-fill').style.strokeDashoffset = offset;
  document.getElementById('ring-cal').textContent = Math.round(totalCal);
  document.getElementById('ring-remain').textContent = '/ ' + GOAL_CAL;
  const rem = Math.max(0, GOAL_CAL - totalCal);
  document.getElementById('kcal-remain').textContent = Math.round(rem) + ' kcal kaldı';
  document.getElementById('m-protein').textContent = Math.round(protein) + 'g';
  document.getElementById('m-carbs').textContent = Math.round(carbs) + 'g';
  document.getElementById('m-fat').textContent = Math.round(fat) + 'g';
  document.getElementById('mb-protein').style.width = Math.min(100, (protein/60)*100) + '%';
  document.getElementById('mb-carbs').style.width = Math.min(100, (carbs/250)*100) + '%';
  document.getElementById('mb-fat').style.width = Math.min(100, (fat/65)*100) + '%';
}

function renderWater() {
  const day = getDay();
  const filled = Math.floor(day.water / 250);
  const container = document.getElementById('water-cups');
  container.innerHTML = '';
  for (let i = 0; i < WATER_CUPS; i++) {
    const c = document.createElement('div');
    c.className = 'cup' + (i < filled ? ' filled' : '');
    c.textContent = '💧';
    c.onclick = () => {
      day.water = i < filled ? i * 250 : (i+1) * 250;
      save(); renderWater(); renderSummary();
    };
    container.appendChild(c);
  }
  document.getElementById('water-text').textContent = day.water + ' / ' + WATER_GOAL + ' ml';
  document.getElementById('water-bar').style.width = Math.min(100, (day.water/WATER_GOAL)*100) + '%';
}

const MEAL_BADGE = { 'Kahvaltı':'breakfast','Öğle':'lunch','Akşam':'dinner','Atıştırma':'snack' };
function renderMeals() {
  const day = getDay();
  const container = document.getElementById('meal-list');
  document.getElementById('meal-count').textContent = day.meals.length + ' öğün';
  if (!day.meals.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🍽️</div><p>Henüz öğün yok.<br>+ butonuna bas, fotoğraf çek<br>veya manuel ekle.</p></div>';
    return;
  }
  container.innerHTML = '';
  day.meals.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'meal-item';
    const badgeCls = 'badge-' + (MEAL_BADGE[m.mealType] || 'snack');
    div.innerHTML = `
      <div class="meal-icon">${m.emoji||'🍽️'}</div>
      <div class="meal-info">
        <div class="meal-name">${m.name}<span class="meal-badge ${badgeCls}">${m.mealType||''}</span></div>
        <div class="meal-meta">${m.gram ? m.gram+(m.unit||'g')+' · ' : ''}P:${Math.round(m.protein||0)}g  K:${Math.round(m.carbs||0)}g  Y:${Math.round(m.fat||0)}g</div>
      </div>
      <div class="meal-cal">${Math.round(m.calories)}</div>
      <button class="meal-del" data-i="${i}">×</button>
    `;
    div.querySelector('.meal-del').onclick = () => {
      day.meals.splice(i, 1); save(); updateAll();
    };
    container.appendChild(div);
  });
}

// Modal
const modal = document.getElementById('add-modal');
document.getElementById('fab-btn').onclick = () => { modal.classList.add('open'); };
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

function closeModal() {
  modal.classList.remove('open');
  document.getElementById('photo-result').innerHTML = '';
  document.getElementById('manual-result').innerHTML = '';
  document.getElementById('food-name').value = '';
  document.getElementById('food-gram').value = '';
  document.getElementById('photo-input').value = '';
}

function switchTab(tab) {
  document.getElementById('panel-photo').style.display = tab === 'photo' ? '' : 'none';
  document.getElementById('panel-manual').style.display = tab === 'manual' ? '' : 'none';
  document.getElementById('tab-photo').className = 'tab' + (tab==='photo'?' active':'');
  document.getElementById('tab-manual').className = 'tab' + (tab==='manual'?' active':'');
}

// Meal type chips
function selectMealType(el, panel) {
  const parent = panel === 'photo' ? document.getElementById('photo-meal-chips') : document.getElementById('manual-meal-chips');
  if (!parent) return;
  parent.querySelectorAll('.meal-type-chip').forEach(c => {
    const t = c.dataset.type;
    c.className = 'meal-type-chip';
  });
  const type = el.dataset.type;
  const cls = type === 'Kahvaltı' ? 'sel-breakfast' : type === 'Öğle' ? 'sel-lunch' : type === 'Akşam' ? 'sel-dinner' : 'sel-snack';
  el.className = 'meal-type-chip ' + cls;
  if (panel === 'photo') selectedMealTypePhoto = type;
  else selectedMealTypeManual = type;
}

// Photo
document.getElementById('photo-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const result = document.getElementById('photo-result');
  const reader = new FileReader();
  reader.onload = async (ev) => {
    const base64 = ev.target.result.split(',')[1];
    const preview = ev.target.result;
    result.innerHTML = `<img class="preview-img" src="${preview}"/><div class="loading-box"><div class="spinner"></div><p>Yemek tanınıyor...</p></div>`;
    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1000,
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:base64}},
            {type:'text',text:`Bu yemek fotoğrafını analiz et. SADECE JSON döndür:
{"name":"Türkçe yemek adı","emoji":"emoji","calories":sayı,"protein":sayı,"carbs":sayı,"fat":sayı,"grams":tahmini_gram,"notes":"kısa not"}`}
          ]}]
        })
      });
      const data = await resp.json();
      const text = data.content.map(b=>b.text||'').join('');
      const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
      result.innerHTML = `<img class="preview-img" src="${preview}"/>
        <div class="ai-card">
          <div class="ai-card-header">
            <span class="ai-badge">AI Analizi</span>
            <span class="ai-food-name">${parsed.emoji} ${parsed.name}</span>
          </div>
          <div class="ai-row"><span>Kalori</span><span>${parsed.calories} kcal</span></div>
          <div class="ai-row"><span>Protein</span><span>${parsed.protein}g</span></div>
          <div class="ai-row"><span>Karbonhidrat</span><span>${parsed.carbs}g</span></div>
          <div class="ai-row"><span>Yağ</span><span>${parsed.fat}g</span></div>
          <div class="ai-row"><span>Tahmini porsiyon</span><span>~${parsed.grams}g</span></div>
          ${parsed.notes ? `<div style="font-size:12px;color:var(--text3);padding-top:6px;">${parsed.notes}</div>` : ''}
        </div>
        <div style="margin-bottom:14px;">
          <div class="form-label" style="margin-bottom:8px;">Öğün seç</div>
          <div class="meal-type-row" id="photo-meal-chips">
            <button class="meal-type-chip" data-type="Kahvaltı" onclick="selectMealType(this,'photo')">☀️ Kahvaltı</button>
            <button class="meal-type-chip sel-lunch" data-type="Öğle" onclick="selectMealType(this,'photo')">🌤 Öğle</button>
            <button class="meal-type-chip" data-type="Akşam" onclick="selectMealType(this,'photo')">🌙 Akşam</button>
            <button class="meal-type-chip" data-type="Atıştırma" onclick="selectMealType(this,'photo')">🍎 Atıştırma</button>
          </div>
        </div>
        <button class="btn-green" onclick='confirmAI(${JSON.stringify(JSON.stringify(parsed))})'>✓ Ekle</button>`;
    } catch(err) {
      result.innerHTML = `<img class="preview-img" src="${preview}"/><div style="text-align:center;padding:16px;color:var(--red);font-size:14px;">Analiz yapılamadı. Tekrar dene.</div>`;
    }
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

function confirmAI(jsonStr) {
  const parsed = JSON.parse(jsonStr);
  const day = getDay();
  day.meals.push({name:parsed.name,emoji:parsed.emoji,calories:parsed.calories,protein:parsed.protein,carbs:parsed.carbs,fat:parsed.fat,gram:parsed.grams,unit:'g',mealType:selectedMealTypePhoto});
  save(); updateAll(); closeModal(); showToast('✓ ' + parsed.name + ' eklendi!');
}

async function addManual() {
  const name = document.getElementById('food-name').value.trim();
  const gram = document.getElementById('food-gram').value.trim();
  const unit = document.getElementById('food-unit').value;
  if (!name) { document.getElementById('food-name').focus(); return; }
  const btn = document.getElementById('manual-btn');
  btn.disabled = true; btn.textContent = 'Hesaplanıyor...';
  const resultEl = document.getElementById('manual-result');
  resultEl.innerHTML = '<div class="loading-box"><div class="spinner"></div><p>Kalori hesaplanıyor...</p></div>';
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getApiKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:400,
        messages:[{role:'user',content:`"${name}" yemeğinin ${gram?gram+' '+unit:'1 porsiyon'} için besin değerleri. SADECE JSON: {"name":"tam ad","emoji":"emoji","calories":sayı,"protein":sayı,"carbs":sayı,"fat":sayı}`}]
      })
    });
    const data = await resp.json();
    const text = data.content.map(b=>b.text||'').join('');
    const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
    const day = getDay();
    day.meals.push({name:parsed.name,emoji:parsed.emoji,calories:parsed.calories,protein:parsed.protein,carbs:parsed.carbs,fat:parsed.fat,gram:gram||'1',unit,mealType:selectedMealTypeManual});
    save(); updateAll(); closeModal();
    showToast('✓ ' + parsed.name + ' eklendi!');
  } catch(e) {
    resultEl.innerHTML = '<div style="color:var(--red);font-size:13px;padding:8px;">Hata, tekrar dene.</div>';
  }
  btn.disabled = false; btn.textContent = 'Kalori Hesapla ve Ekle';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showStats() {
  // 7 günlük özet
  const lines = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i); d.setHours(0,0,0,0);
    const k = dateKey(d);
    const day = allData[k] || {meals:[],water:0};
    const cal = day.meals.reduce((s,m)=>s+m.calories,0);
    const label = i===0?'Bugün':i===1?'Dün':d.toLocaleDateString('tr-TR',{weekday:'short'});
    lines.push({label,cal:Math.round(cal),water:day.water});
  }
  const max = Math.max(...lines.map(l=>l.cal), 1);
  const bars = lines.map(l => {
    const h = Math.round((l.cal/max)*80);
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;">
      <div style="font-size:10px;color:var(--text3);font-family:var(--mono);">${l.cal||''}</div>
      <div style="height:${h}px;min-height:4px;width:24px;background:${l.cal>GOAL_CAL?'var(--red)':'var(--purple)'};border-radius:4px 4px 0 0;transition:height 0.4s;"></div>
      <div style="font-size:10px;color:var(--text3);">${l.label}</div>
    </div>`;
  }).join('');

  const modal2 = document.createElement('div');
  modal2.className = 'modal-overlay open';
  modal2.innerHTML = `<div class="modal"><div class="modal-handle"></div>
    <div class="modal-title">7 Günlük Özet</div>
    <div style="display:flex;align-items:flex-end;gap:6px;height:120px;padding:0 8px;margin-bottom:20px;">${bars}</div>
    <div style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:20px;">Kırmızı = hedef aşıldı (${GOAL_CAL} kcal)</div>
    <button class="btn-primary" onclick="this.closest('.modal-overlay').remove()">Kapat</button>
  </div>`;
  modal2.addEventListener('click', e => { if(e.target===modal2) modal2.remove(); });
  document.body.appendChild(modal2);
}

// Init
updateAll();
</script>
</body>
</html>
